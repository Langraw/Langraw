    <script>
       // 1. 顶部导航逻辑（保留你原来的）
// 1. 处理顶部导航栏下拉
const menuContainer = document.querySelector('.menu-container');
const dropdownBg = document.querySelector('.dropdown-bg');
if (menuContainer && dropdownBg) {
    menuContainer.addEventListener('mouseenter', () => {
        dropdownBg.style.height = dropdownBg.scrollHeight + "px";
    });
    menuContainer.addEventListener('mouseleave', () => {
        dropdownBg.style.height = "0px";
    });
}

// 2. 处理 Rig 侧滑面板的开启与关闭
const rigBtn = document.getElementById('rigTrigger');
const rigPanel = document.getElementById('rigSidePanel');
const rigClose = document.querySelector('.close-panel-btn');

if (rigBtn && rigPanel) {
    rigBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        rigPanel.classList.add('active'); // 弹出
    });
}

if (rigClose) {
    rigClose.addEventListener('click', () => {
        rigPanel.classList.remove('active'); // 关闭
    });
}

// 3. 处理点击作品切换视频和 Intro (完整替换版)
document.querySelectorAll('.work-item').forEach(item => {
    item.addEventListener('click', function() {
        const shortName = this.getAttribute('data-shortname') || this.innerText;
        const videoSrc1 = this.getAttribute('data-video');
        const videoSrc2 = this.getAttribute('data-video2'); 
        const descText = this.getAttribute('data-desc');
        const extraText = this.getAttribute('data-extra'); // 新增：获取额外介绍

        const mainTitle = document.getElementById('rigTitle');
        const videoContainer = document.getElementById('rigVideoContainer');
        const infoSidebar = document.getElementById('rigInfoSidebar');

        // 1. 更新标题
        if (mainTitle) {
            mainTitle.innerHTML = `Rig : <span style="font-weight: 300; margin-left: 10px; color: #666;">${shortName}</span>`;
        }

        // 2. 注入视频与额外 Intro
        if (videoContainer) {
            videoContainer.style.border = "none";
            
            if (videoSrc2) {
                // 双视频模式：注入视频 + 紧跟其下的额外 intro
                videoContainer.style.display = "block";
                videoContainer.style.background = "transparent"; // 改为 block 方便纵向排列
                videoContainer.innerHTML = `
                    <div class="double-video-wrapper">
                        <video controls playsinline><source src="${videoSrc1}" type="video/mp4"></video>
                        <video controls playsinline><source src="${videoSrc2}" type="video/mp4"></video>
                    </div>
                    <div class="extra-video-intro">
                        ${extraText}
                    </div>`;
            } else {
                // 单视频模式：保持原样
                videoContainer.style.display = "flex";
                videoContainer.innerHTML = `
                    <video controls playsinline style="width:100%; height:100%; object-fit:contain;">
                        <source src="${videoSrc1}" type="video/mp4">
                    </video>`;
            }
        }

        // 3. 注入侧边基础描述
        if (infoSidebar) {
            infoSidebar.innerHTML = `
                <div class="work-detail-info" style="animation: fadeIn 0.5s ease;">
                    <p style="color: #444; line-height: 1.8; white-space: pre-line;">${descText}</p>
                </div>`;
        }

        const rigPanel = document.getElementById('rigSidePanel');
        if (rigPanel) rigPanel.classList.remove('active');
    });
});
    </script>
